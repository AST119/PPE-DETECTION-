<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE AI Guardian v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-deep: #02040a;
            --neon-blue: #00f2ff;
            --neon-green: #00ff88;
            --neon-red: #ff0055;
            --neon-yellow: #ffcc00;
        }

        body { background-color: var(--bg-deep); color: #e2e8f0; font-family: 'Inter', sans-serif; transition: background 0.3s; }
        
        /* Flashy Red Alert */
        .red-alert-active { background-color: #1a0505 !important; }
        .red-alert-active #feed-container { border: 4px solid var(--neon-red); animation: shake 0.1s infinite; box-shadow: 0 0 50px rgba(255, 0, 85, 0.4); }
        .red-alert-active #status-panel { background: #3d0a0a !important; border-color: var(--neon-red) !important; animation: glitch 0.3s infinite; }
        
        /* LED Visuals */
        .led { width: 50px; height: 50px; border-radius: 50%; background: #0a0f1d; border: 4px solid #1e293b; transition: 0.3s; }
        .led-green-active { background: var(--neon-green); box-shadow: 0 0 30px var(--neon-green); border-color: #fff; }
        .led-yellow-active { background: var(--neon-yellow); box-shadow: 0 0 30px var(--neon-yellow); border-color: #fff; animation: pulse 1s infinite; }
        .led-red-active { background: var(--neon-red); box-shadow: 0 0 50px var(--neon-red); border-color: #fff; animation: blink 0.3s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
        @keyframes glitch { 0% { transform: translateX(0); } 20% { transform: translateX(-3px); } 40% { transform: translateX(3px); } 100% { transform: translateX(0); } }

        #overlay { pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 25; }
        .frozen { filter: brightness(1.2) contrast(1.1) sepia(0.2); }
    </style>
</head>
<body class="h-screen flex flex-col p-3 gap-3 overflow-hidden">

    <!-- Screen Flash Overlay -->
    <div id="flash-overlay" class="fixed inset-0 pointer-events-none z-[100] bg-red-600/0 transition-all duration-75"></div>

    <header class="h-16 bg-[#0a0f1d] border border-cyan-900/30 rounded-2xl flex items-center justify-between px-8 shrink-0">
        <div class="flex items-center gap-4">
            <i data-lucide="zap" class="text-yellow-400 w-8 h-8 fill-yellow-400"></i>
            <h1 class="font-black tracking-tighter text-2xl uppercase italic">PPE<span class="text-cyan-400">COMMAND</span></h1>
        </div>
        
        <div class="flex bg-black/40 p-1 rounded-xl border border-white/10">
            <button id="btn-photo" class="px-6 py-2 rounded-lg text-[10px] font-black tracking-widest transition bg-cyan-600 text-white">PHOTO MODE</button>
            <button id="btn-live" class="px-6 py-2 rounded-lg text-[10px] font-black tracking-widest transition text-gray-500 hover:text-white">LIVE MODE</button>
        </div>
    </header>

    <div class="flex-1 grid grid-cols-2 grid-rows-2 gap-3 min-h-0">
        
        <!-- COUNTERS -->
        <section class="bg-[#0a0f1d] rounded-3xl border border-white/5 p-8 grid grid-cols-2 gap-4">
            <div class="bg-black/40 rounded-2xl border border-white/5 flex flex-col items-center justify-center p-4">
                <span id="count-person" class="text-5xl font-black">0</span>
                <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500 mt-2">Personnel</label>
            </div>
            <div class="bg-black/40 rounded-2xl border border-white/5 flex flex-col items-center justify-center p-4" style="border-bottom: 3px solid var(--neon-yellow)">
                <span id="count-hat" class="text-5xl font-black text-yellow-400">0</span>
                <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500 mt-2">Hard Hats</label>
            </div>
            <div class="bg-black/40 rounded-2xl border border-white/5 flex flex-col items-center justify-center p-4" style="border-bottom: 3px solid #f97316">
                <span id="count-vest" class="text-5xl font-black text-orange-500">0</span>
                <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500 mt-2">Vests</label>
            </div>
            <div class="bg-black/40 rounded-2xl border border-white/5 flex flex-col items-center justify-center p-4" style="border-bottom: 3px solid var(--neon-blue)">
                <span id="count-gloves" class="text-5xl font-black text-cyan-400">0</span>
                <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500 mt-2">Gloves</label>
            </div>
        </section>

        <!-- FEED -->
        <section id="feed-container" class="bg-black rounded-3xl border border-white/5 relative overflow-hidden transition-all duration-200">
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
            <img id="frozen-frame" class="absolute inset-0 w-full h-full object-cover hidden z-10 frozen" />
            <canvas id="overlay"></canvas>
            
            <div id="mode-hint" class="absolute bottom-6 left-1/2 -translate-x-1/2 px-8 py-3 bg-cyan-600 rounded-full text-[11px] font-black z-30 tracking-widest text-white shadow-xl shadow-cyan-500/40">
                ANY KEY TO CAPTURE
            </div>
        </section>

        <!-- LEDS -->
        <section class="bg-[#0a0f1d] rounded-3xl border border-white/5 p-8 flex flex-col items-center justify-center">
            <div class="flex justify-around w-full">
                <div class="flex flex-col items-center gap-4"><div id="led-green" class="led"></div><span class="text-[10px] font-black text-gray-600">SAFE</span></div>
                <div class="flex flex-col items-center gap-4"><div id="led-yellow" class="led"></div><span class="text-[10px] font-black text-gray-600">CAUTION</span></div>
                <div class="flex flex-col items-center gap-4"><div id="led-red" class="led"></div><span class="text-[10px] font-black text-gray-600">DANGER</span></div>
            </div>
        </section>

        <!-- ALERT PANEL -->
        <section id="status-panel" class="bg-[#0a0f1d] rounded-3xl border border-white/5 p-8 flex flex-col gap-6 transition-all duration-200">
            <div class="flex items-center gap-6">
                <div id="buzzer-ui" class="w-16 h-16 rounded-2xl bg-slate-900 flex items-center justify-center">
                    <i data-lucide="alert-triangle" id="buzzer-icon" class="text-slate-600 w-8 h-8"></i>
                </div>
                <div>
                    <h3 id="status-title" class="text-3xl font-black italic uppercase tracking-tighter">Standby</h3>
                    <p id="status-subtitle" class="text-[11px] font-bold text-cyan-500 tracking-[0.3em] uppercase">Security Level: Low</p>
                </div>
            </div>
            <div class="flex-1 bg-black/40 rounded-2xl p-6 border border-white/5">
                <p id="ai-text" class="text-[16px] italic text-slate-300 leading-relaxed font-medium">Ready for next site evaluation...</p>
            </div>
        </section>
    </div>

    <script>
        const CONFIG = {
            ROBOFLOW_URL: 'https://serverless.roboflow.com/gaming-nkqzr/workflows/detect-count-and-visualize-2',
            ROBOFLOW_KEY: 'cqgYJtTKSrUPMyoV48y1',
            HF_TOKEN: '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', 
            HF_MODEL_URL: 'https://api-inference.huggingface.co/models/gpt2',
            CLASSES: {
                'person': { label: 'PERSON', color: '#ffffff' },
                'helmet': { label: 'HARD HAT', color: '#ffcc00' },
                'vest': { label: 'VEST', color: '#f97316' },
                'gloves': { label: 'GLOVES', color: '#00f2ff' }
            }
        };

        let mode = 'photo';
        let isResultView = false;
        let isProcessing = false;
        let autoTimer = null;
        let audioCtx = null;

        const video = document.getElementById('webcam');
        const frozenImg = document.getElementById('frozen-frame');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');

        async function init() {
            lucide.createIcons();
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                overlay.width = video.videoWidth;
                overlay.height = video.videoHeight;
            };
        }

        async function runInference() {
            if (isProcessing) return;
            isProcessing = true;
            isResultView = true;
            
            document.getElementById('mode-hint').innerText = "ANALYZING...";

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tempCanvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = tempCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            if (mode === 'photo') {
                frozenImg.src = tempCanvas.toDataURL('image/jpeg');
                frozenImg.classList.remove('hidden');
            }

            try {
                const response = await fetch(CONFIG.ROBOFLOW_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: CONFIG.ROBOFLOW_KEY, inputs: { "image": { "type": "base64", "value": base64 } } })
                });
                const data = await response.json();
                
                let preds = [];
                const out = data.outputs[0];
                for(let k in out) { if(out[k].predictions) { preds = out[k].predictions; break; } }

                processLogic(preds);
                drawBoxes(preds);
                if(mode === 'photo') document.getElementById('mode-hint').innerText = "ANY KEY TO RESET CAMERA";
            } catch (e) { console.error(e); }
            finally { isProcessing = false; }
        }

        function resetToLive() {
            isResultView = false;
            frozenImg.classList.add('hidden');
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            document.getElementById('mode-hint').innerText = "ANY KEY TO CAPTURE";
            resetUI();
        }

        function processLogic(preds) {
            const counts = { person: 0, helmet: 0, vest: 0, gloves: 0 };
            preds.forEach(p => { if(counts.hasOwnProperty(p.class)) counts[p.class]++; });

            document.getElementById('count-person').innerText = counts.person;
            document.getElementById('count-hat').innerText = counts.helmet;
            document.getElementById('count-vest').innerText = counts.vest;
            document.getElementById('count-gloves').innerText = counts.gloves;

            const persons = preds.filter(p => p.class === 'person');
            const gear = preds.filter(p => p.class !== 'person');

            let status = 'green';
            let title = 'SITE SECURE';

            if (persons.length > 0) {
                let hasFullViolation = false; 
                let hasPartialViolation = false;

                persons.forEach(p => {
                    const hasHat = gear.some(g => g.class === 'helmet' && isOverlap(g, p));
                    const hasVest = gear.some(g => g.class === 'vest' && isOverlap(g, p));
                    const hasGlove = gear.some(g => g.class === 'gloves' && isOverlap(g, p));

                    if (!hasHat) hasFullViolation = true;
                    else if (!hasVest || !hasGlove) hasPartialViolation = true;
                });

                if (hasFullViolation) { status = 'red'; title = 'DANGER: HEAD PROTECTION MISSING'; }
                else if (hasPartialViolation) { status = 'yellow'; title = 'WARNING: INCOMPLETE PPE'; }
            }

            updateUI(status, title, counts);
        }

        function isOverlap(item, person) {
            return (item.x > person.x - person.width/2 && item.x < person.x + person.width/2 &&
                    item.y > person.y - person.height/2 && item.y < person.y + person.height/2);
        }

        function resetUI() {
            document.body.classList.remove('red-alert-active');
            document.getElementById('status-panel').classList.remove('red-alert-active');
            document.querySelectorAll('.led').forEach(l => l.className = 'led');
            document.getElementById('status-title').innerText = "Monitoring...";
            document.getElementById('status-title').className = "text-3xl font-black italic uppercase tracking-tighter text-slate-500";
        }

        function updateUI(state, title, c) {
            resetUI();
            document.getElementById(`led-${state}`).classList.add(`led-${state}-active`);
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-title').className = `text-3xl font-black italic uppercase tracking-tighter ${state === 'red' ? 'text-red-500' : (state === 'yellow' ? 'text-yellow-500' : 'text-green-500')}`;

            if (state === 'red') {
                document.body.classList.add('red-alert-active');
                triggerSiren();
                flashScreen();
            }

            fetchAdvice(c, state);
        }

        function flashScreen() {
            const flash = document.getElementById('flash-overlay');
            flash.classList.replace('bg-red-600/0', 'bg-red-600/30');
            setTimeout(() => flash.classList.replace('bg-red-600/30', 'bg-red-600/0'), 100);
        }

        async function fetchAdvice(c, s) {
            const prompt = `Data: ${c.person} people, ${c.helmet} hats, ${c.vest} vests, ${c.gloves} gloves. Status: ${s.toUpperCase()}. Task: One short urgent safety directive. Instruction:`;
            try {
                const res = await fetch(CONFIG.HF_MODEL_URL, {
                    headers: { Authorization: `Bearer ${CONFIG.HF_TOKEN}` },
                    method: "POST", body: JSON.stringify({ inputs: prompt }),
                });
                const data = await res.json();
                let advice = data[0].generated_text.split("Instruction:")[1] || "Verify compliance.";
                document.getElementById('ai-text').innerText = advice.split('.')[0].trim() + ".";
            } catch (e) { document.getElementById('ai-text').innerText = "Safety breach detected. Enforce PPE requirements immediately."; }
        }

        function triggerSiren() {
            if (!audioCtx) audioCtx = new AudioContext();
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.5, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
            
            // Dual oscillator for discordant "alarming" sound
            [440, 554].forEach(f => {
                const o = audioCtx.createOscillator();
                o.type = 'square';
                o.frequency.value = f;
                o.connect(g);
                o.start();
                o.stop(audioCtx.currentTime + 1.5);
            });
            g.connect(audioCtx.destination);
        }

        function drawBoxes(preds) {
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            preds.forEach(p => {
                const conf = CONFIG.CLASSES[p.class] || { label: p.class, color: '#fff' };
                const x = p.x - p.width/2;
                const y = p.y - p.height/2;
                ctx.strokeStyle = conf.color;
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, p.width, p.height);
                ctx.fillStyle = conf.color;
                ctx.fillRect(x, y - 25, ctx.measureText(conf.label).width + 15, 25);
                ctx.fillStyle = "black";
                ctx.font = "900 12px Inter";
                ctx.fillText(conf.label, x + 5, y - 8);
            });
        }

        // --- BUTTONS ---
        document.getElementById('btn-photo').onclick = () => {
            mode = 'photo';
            document.getElementById('btn-photo').className = "px-6 py-2 rounded-lg text-[10px] font-black bg-cyan-600 text-white";
            document.getElementById('btn-live').className = "px-6 py-2 rounded-lg text-[10px] font-black text-gray-500 hover:text-white";
            resetToLive();
            clearInterval(autoTimer);
        };

        document.getElementById('btn-live').onclick = () => {
            mode = 'live';
            document.getElementById('btn-live').className = "px-6 py-2 rounded-lg text-[10px] font-black bg-cyan-600 text-white";
            document.getElementById('btn-photo').className = "px-6 py-2 rounded-lg text-[10px] font-black text-gray-500 hover:text-white";
            resetToLive();
            document.getElementById('mode-hint').innerText = "LIVE AUTO-SCAN ACTIVE";
            autoTimer = setInterval(runInference, 3000);
        };

        window.onkeydown = () => { 
            if (mode === 'photo' && !isProcessing) {
                isResultView ? resetToLive() : runInference();
            }
        };

        init();
    </script>
</body>
</html>
